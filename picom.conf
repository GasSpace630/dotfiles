##################################
# Backend
##################################

backend = "glx";
vsync = true;

##################################
# Shadows
##################################

shadow = true;
shadow-radius = 8;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.18;

shadow-exclude = [
    "class_g = 'Conky'",
    "class_g = 'Xfce4-notifyd'",
    "name = 'Notification'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

##################################
# Rounded Corners
##################################

corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'Xfce4-panel'"
];

##################################
# Transparency
##################################

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

##################################
# Blur
##################################

blur: {
    method = "none";
}

##################################
# Fading / Animations
##################################

fading = false;
fade-in-step = 0;
fade-out-step = 0;

##################################
# Misc
##################################

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;
#log-level = "warn";
